<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Finder</title>
  <style>
    :root {
      --bg: #0f1115; --card: #171a21; --fg: #e7e9ee; --muted: #9aa1ad;
      --accent: #4f8cff; --border: #262b36; --ok: #3ecf8e;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg:#f6f7f9; --card:#fff; --fg:#141821; --muted:#5c6470; --border:#e3e6eb; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; justify-content: center; padding: 6vh 16px;
    }
    main { width: 100%; max-width: 720px; }
    h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
    p.sub { color: var(--muted); margin: 0 0 1.5rem; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    form { display: flex; gap: 10px; }
    input {
      flex: 1; padding: 12px 14px; border-radius: 8px; font-size: 15px;
      background: transparent; color: var(--fg); border: 1px solid var(--border);
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    button {
      padding: 12px 18px; border: 0; border-radius: 8px; font-size: 15px;
      font-weight: 600; background: var(--accent); color: #fff; cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: default; }
    #status { margin: 14px 0 0; color: var(--muted); font-size: 13px; min-height: 18px; }
    pre {
      margin: 14px 0 0; max-height: 55vh; overflow: auto; white-space: pre-wrap;
      word-break: break-word; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; font-size: 12.5px; color: var(--muted);
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Job Finder</h1>
    <p class="sub">Enter a role. The agent searches Ashby, Greenhouse &amp; Lever, screens out dead and out-of-locale links, and exports the results.</p>
    <div class="card">
      <form id="f">
        <input id="role" name="role" placeholder="e.g. Software Engineer" autocomplete="off" required />
        <button id="go" type="submit">Find jobs</button>
      </form>
      <p id="status"></p>
      <pre id="out" hidden></pre>
    </div>
  </main>

  <script>
    const form = document.getElementById('f');
    const roleEl = document.getElementById('role');
    const go = document.getElementById('go');
    const statusEl = document.getElementById('status');
    const out = document.getElementById('out');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const role = roleEl.value.trim();
      if (!role) return;

      go.disabled = true;
      statusEl.textContent = 'Running… this takes a minute or two.';
      out.hidden = false;
      out.textContent = '';

      try {
        const resp = await fetch('/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role }),
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          out.textContent += decoder.decode(value, { stream: true });
          out.scrollTop = out.scrollHeight;
        }
        statusEl.textContent = 'Done.';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      } finally {
        go.disabled = false;
      }
    });
  </script>
</body>
</html>
